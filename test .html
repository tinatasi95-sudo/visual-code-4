    <style>
        .bg-cover {
            background-position: center center;
            background-size: cover;
        }

        /* s03-2  Carusel 幻燈片效果 */
        .s03-img {
            width: 100%;
            height: 85vh;
            object-fit: cover;
        }

        .carousel-item {
            min-height: 400px;
            position: relative;
        }

        .carousel-item::before {
            position: absolute;
            content: "";
            inset: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.01), rgba(0, 0, 0, 0.9));
        }

        .carousel-caption-block {
            position: absolute;
            left: 18%;
            bottom: 30%;
            max-width: 500px;
        }

        .carousel-badge {
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.5);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 0.85rem;
            letter-spacing: 0.2rem;
            display: inline-block;
        }

        .carousel-list i {
            width: 18px;
        }

        /* .s05 時間軸 */
        .s05-timeline-section {
            position: relative;
        }

        .s05-timeline-section::before {
            position: absolute;
            content: "";
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e9e8e8;
            left: 50%;
            transform: translateX(-50%);
        }

        .s05-timeline-section-pointer {
            position: relative;
        }

        .s05-timeline-section-pointer::before {
            position: absolute;
            content: "";
            width: 20px;
            height: 20px;
            background-color: #e9e8e8;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid #dd5fa9;
            border-radius: 50%;
        }

        .s05-timeline-section-pointer:hover::before {
            width: 30px;
            height: 30px;
        }

        .s08-userimg {
            width: 120px;
            height: 160px;
            object-fit: cover;
            transition: border-radius 1s, transform 1s;
        }

        .s08-userimg:hover {
            border-radius: 50px;
            box-shadow: 2px 2px 2px 2px #ccc;
            transform: scale(1.2);
        }

        @media screen and (max-width: 768px) {

            .s07-text,
            .s09-text {
                z-index: 1;
                background-color: rgba(80, 75, 75, 0.5);
                color: #e9e8e8;
                padding: 20px;
                margin: 15px;
                border-radius: 15px;
            }
        }
    </style>
</head>
